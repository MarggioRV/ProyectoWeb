<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>CineHV</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
    
    <link rel="stylesheet" th:href="@{/css/general.css}" />
  </head>
  <body>
    <!-- NAVBAR -->
    <div th:replace="~{fragmentos/navbar2 :: navbar}"></div>

    <!-- ALERTA FLASH  -->
    <div
      th:if="${alertMsg}"
      th:class="|alert alert-${alertTipo} alert-dismissible fade show alert-flotante|"
      role="alert"
    >
      <span th:text="${alertMsg}">Mensaje</span>
      <button
        type="button"
        class="btn-close"
        data-bs-dismiss="alert"
        aria-label="Cerrar"
      ></button>
    </div>

    <div class="container py-4">
      <!-- FILA PRINCIPAL -->
      <div class="row g-4">
        <!-- COLUMNA FORMULARIO -->
        <div class="col-md-8">
          <div class="form-panel">
            <h5
              class="mb-4"
              style="letter-spacing: 1px"
              th:text="${movie.id != 0} ? 'Editar película' : 'Nueva película'"
            >
              Nueva película
            </h5>

            <form
              th:action="${movie.id != 0}
                            ? @{/movie/editar/{id}(id=${movie.id})}
                            : @{/movie/editar}"
              th:object="${movie}"
              method="post"
              id="movieForm"
            >
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">Título *</label>
                  <input
                    type="text"
                    class="form-control"
                    th:field="*{titulo}"
                    placeholder="Ej: Inception"
                    id="inp-titulo"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Director *</label>
                  <input
                    type="text"
                    class="form-control"
                    th:field="*{director}"
                    placeholder="Ej:..."
                    id="inp-director"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Duración (min) *</label>
                  <input
                    type="number"
                    class="form-control"
                    th:field="*{duracion}"
                    placeholder="Ej: 148"
                    id="inp-duracion"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Género *</label>
                  <input
                    type="text"
                    class="form-control"
                    th:field="*{genero}"
                    placeholder="Ej: Ciencia ficción"
                    id="inp-genero"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Clasificación *</label>
                  <select
                    class="form-select"
                    th:field="*{clasificacion}"
                    id="inp-clasificacion"
                  >
                    <option value="">-- Seleccionar --</option>
                    <option value="G">G — Todos los públicos</option>
                    <option value="PG">PG — Guía parental</option>
                    <option value="PG-13">PG-13</option>
                    <option value="R">R — Restringido</option>
                    <option value="NC-17">NC-17</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Idioma</label>
                  <input
                    type="text"
                    class="form-control"
                    th:field="*{idioma}"
                    placeholder="Ej: Español"
                    id="inp-idioma"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Formato</label>
                  <input
                    type="text"
                    class="form-control"
                    th:field="*{formato}"
                    placeholder="Ej: 2D, 3D, IMAX"
                    id="inp-formato"
                  />
                </div>

                <!-- ── Fechas con Flatpickr custom ── -->
                <div class="col-md-6">
                  <label class="form-label">Fecha de estreno *</label>
                  <input
                    type="text"
                    class="form-control custom-date"
                    th:field="*{fechaEstreno}"
                    placeholder="YYYY-MM-DD"
                    id="inp-fechaEstreno"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Fin de cartelera *</label>
                  <input
                    type="text"
                    class="form-control custom-date"
                    th:field="*{fechaFinCartelera}"
                    placeholder="YYYY-MM-DD"
                    id="inp-fechaFinCartelera"
                  />
                </div>

                <div class="col-12">
                  <label class="form-label">Sinopsis</label>
                  <textarea
                    class="form-control"
                    rows="3"
                    th:field="*{sinopsis}"
                    placeholder="Descripción de la película..."
                  ></textarea>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Distribuidora</label>
                  <input
                    type="text"
                    class="form-control"
                    th:field="*{distribuidora}"
                    placeholder="Ej: Warner Bros"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label">URL de imagen</label>
                  <input
                    type="text"
                    class="form-control"
                    th:field="*{imagen}"
                    placeholder="https://..."
                    id="inp-imagen"
                  />
                </div>
              </div>

              <div class="d-flex gap-2 mt-4">
                <button
                  type="button"
                  class="btn btn-outline-info"
                  onclick="aplicarPreview()"
                >
                  Aplicar preview
                </button>
                <button type="submit" class="btn btn-primary">Ingresar</button>
                <a
                  th:if="${movie.id != 0}"
                  th:href="@{/movie/editar}"
                  class="btn btn-outline-secondary ms-auto"
                >
                  Cancelar
                </a>
              </div>
            </form>
          </div>
        </div>

        <!-- COLUMNA SIDEBAR -->
        <div class="col-md-4">
          <div class="preview-sidebar">
            <p class="section-title text-center">Vista previa</p>
            <div
              th:replace="~{fragmentos/sidebarPreview :: sidebarPreview}"
            ></div>
          </div>
        </div>
      </div>

      <!-- ── CARDS EXISTENTES —── -->
      <div class="cards-section mt-4">
        <p class="section-title">Cards existentes</p>
      <!-- Cards existentes separadas por un gap, y centradas si no ocupan todo el ancho -->
        <div class="d-flex flex-wrap gap-4 justify-content-center">
          <div th:each="m : ${movies}">
            <div
              th:replace="~{fragmentos/cardPreview :: cardPreview(item=${m}, mostrarBotones=${true})}"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragmentos/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script th:src="@{/js/movies.js}"></script>

  </body>
</html>
