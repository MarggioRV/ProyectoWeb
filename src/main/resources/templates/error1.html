<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Error 404 – No Encontrado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/base.css}" />
  </head>
  <body>
    <div class="d-flex flex-column align-items-center justify-content-center"
         style="min-height: 100vh;">

      <!-- Mensaje  -->
      <p style="font-family: 'Cinzel', serif; font-size: 2.1rem; 
                color: #b99804; letter-spacing: 3px; margin-bottom: 1rem;">
        click para continuar
      </p>

      <!-- GIF clickeable -->
      <a th:href="@{/movies}">
        <img class="error404"
             th:src="@{/Images/404AnimadoM2.gif}"
             alt="Página no encontrada"
             style="max-width: 800px; width: 100%; display: block; cursor: pointer;"/>
      </a>

    </div>
  </body>
</html>
