<div th:fragment="carrusel2(lista)">
  <div id="carouselProximamente" class="carousel slide" data-bs-ride="carousel">
    
    <div class="carousel-inner" style="max-height: 300px; overflow: hidden;">
      <div th:each="movie, i : ${lista}"
           th:classappend="${i.first} ? 'active'"
           class="carousel-item"
           data-bs-interval="3000">
        
        <!-- Imagen del carrusel, style="object-fit: cover; height: 300px;" -->
        <img th:src="${movie.imagen}" class="d-block w-100"
             th:alt="${movie.titulo}"/>

      </div>
    </div>
    <button class="carousel-control-prev" type="button"
            data-bs-target="#carouselProximamente" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button"
            data-bs-target="#carouselProximamente" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>
