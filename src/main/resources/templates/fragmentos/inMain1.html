<!-- fragmentos/InMain1.html -->
<div th:fragment="inMain1(movie)" xmlns:th="http://www.thymeleaf.org">
    <div class="movie-info-main" style="display:flex; flex-direction:column; gap:1rem;">

        <div class="info-item">
            <p class="label">Género</p>
            <p class="valor" th:text="${movie.genero}"></p>
        </div>

        <div class="info-item">
            <p class="label">Sinopsis</p>
            <p class="valor" th:text="${movie.sinopsis}"></p>
        </div>

        <div class="info-item">
            <p class="label">Duración</p>
            <p class="valor"
               th:text="${movie.duracion / 60} + 'h ' + ${movie.duracion % 60} + 'm'"></p>
        </div>

        <!-- Clasificación -->
        <div class="info-item centrado">
            <p class="label">Clasificación</p>
            <span class="clas-badge"
                th:classappend="'clas-' + ${movie.clasificacion}"
                th:text="${movie.clasificacion}">
            </span>
        </div>

    </div>
</div>
