<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Proyecto Web</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Tailwind (solo para la sección central) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-light">

    <!-- ========================================================= -->
    <!-- HEADER (NAVBAR)                                           -->
    <!-- ========================================================= -->
    <header>
      <th:block th:replace="~{fragmentos/navbar2 :: navbar}"></th:block>
    </header>



    <!-- ========================================================= -->
    <!-- MAIN CONTENT                                              -->
    <!-- ========================================================= -->
    <main class="container mt-4">

      <!-- ===================== -->
      <!-- FILA 1: CARRUSEL 1    -->
      <!-- ===================== -->
      <div class="row mb-5">
        <div class="col-12">
          <div th:replace="~{fragmentos/carrusel1 :: carrusel1}"></div>
        </div>
      </div>

      <!-- ===================== -->
      <!-- FILA 2: T    -->
      <!-- ===================== -->
      <div class="row my-5">
        <div class="col-12">
          <div th:replace="~{fragmentos/Tailwind :: tailwind}"></div>
        </div>
      </div>

      <!-- ===================== -->
      <!-- FILA 3: CARRUSEL 2    -->
      <!-- ===================== -->
      <div class="row mb-5">
        <div class="col-12">
          <div th:replace="~{fragmentos/carrusel2 :: carrusel2}"></div>
        </div>
      </div>

    </main>



    <!-- ========================================================= -->
    <!-- FOOTER                                                    -->
    <!-- ========================================================= -->
    <footer class="mt-5">
      <div th:replace="~{fragmentos/footer :: footer}"></div>
    </footer>



    <!-- ========================================================= -->
    <!-- SCRIPTS FINALES                                           -->
    <!-- ========================================================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
