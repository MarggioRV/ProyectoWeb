<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Inicio</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/general.css}" />
</head>
<body>

  <!-- Nav -->
   <!-- th:replace inserta el fragmento ? desde fragmentos/?-->
  <div th:replace="~{fragmentos/navbar2 :: navbar}"></div>

  <!-- HERO: carrusel1 con destacadas -->
  <section class="container-fluid px-0">
    <div th:replace="~{fragmentos/carrusel1 :: carrusel1(${destacadas})}"></div>
  </section>

  <!-- EN CARTELERA: grid de cards -->
  <section class="container my-5">
    <h2 class="mb-4">En cartelera</h2>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
      <!-- th:each, agrupar iterar colelciones o el rendirazado, aqui se usa para recorrer la lista de películas -->
      <div th:each="movie : ${cartelera}" class="col d-flex justify-content-center">
        <div th:replace="~{fragmentos/cardPreview :: cardPreview(item=${movie}, mostrarBotones=${false})}"></div>
      </div>
    </div>
  </section>

  <!-- carrusel2 -->
  <!-- <section class="container my-5">
    <h2 class="mb-4">Próximamente</h2>
    <div th:replace="~{fragmentos/carrusel2 :: carrusel2(${proximamente})}"></div>
  </section> -->

  <!-- Footer -->
  <div th:replace="~{fragmentos/footer :: footer}"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
