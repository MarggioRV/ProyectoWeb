<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>CineHV — Películas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/general.css}"/>
  <link rel="stylesheet" th:href="@{/css/movies.css}"/>
</head>
<body>

  <div th:replace="~{fragmentos/navbar2 :: navbar}"></div>

  <div class="container-fluid px-0 mb-4">
    <div th:replace="~{fragmentos/carrusel1 :: carrusel1(lista=${movies})}"></div>
  </div>

  <div class="container py-2">
    <div th:replace="~{fragmentos/filtrosBar :: filtrosBar}"></div>

    <div class="main-panel">
      <div class="cards-grid">
        <div th:each="m : ${movies}">
          <div th:replace="~{fragmentos/cardPreview :: cardPreview(item=${m}, mostrarBotones=false)}"></div>
        </div>
      </div>
    </div>
  </div>

  <div th:replace="~{fragmentos/offcanvasFiltros :: offcanvasFiltros}"></div>
  <div th:replace="~{fragmentos/footer :: footer}"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
